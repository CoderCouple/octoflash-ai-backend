AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Secrets Manager secret for Temporal Cloud connection (address, namespace,
  api_key). Deployed empty by default; populate via params or via the
  Secrets Manager console before stack 05 brings up the worker sidecar.

Parameters:
  ProjectName:
    Description: Project Name to identify stack and infrastructure
    Type: String
  Environment:
    Description: Environment to deploy the Stack
    Type: String
    AllowedValues:
      - prod
      - dev
  TemporalAddress:
    Description: >
      Temporal Cloud endpoint, e.g. <namespace>.<account>.tmprl.cloud:7233.
      Leave blank to deploy a placeholder you can update later.
    Type: String
    Default: ''
  TemporalNamespace:
    Description: Temporal Cloud namespace (e.g. octoflash-dev.<account>)
    Type: String
    Default: ''
  TemporalApiKey:
    Description: Temporal Cloud API key (paste the secret directly; NoEcho)
    Type: String
    NoEcho: true
    Default: ''

Resources:
  TemporalSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-temporal'
      Description: Temporal Cloud connection (address, namespace, api_key)
      SecretString: !Sub |
        {
          "address": "${TemporalAddress}",
          "namespace": "${TemporalNamespace}",
          "api_key": "${TemporalApiKey}"
        }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-temporal-secret

Outputs:
  TemporalSecretArn:
    Description: ARN of the Secrets Manager secret for Temporal Cloud
    Value: !Ref TemporalSecret
    Export:
      Name: !Sub '${AWS::StackName}-TemporalSecretArn'

  TemporalSecretName:
    Description: Name of the Secrets Manager secret
    Value: !Sub '${ProjectName}-${Environment}-temporal'
    Export:
      Name: !Sub '${AWS::StackName}-TemporalSecretName'
