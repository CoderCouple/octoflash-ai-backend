AWSTemplateFormatVersion: '2010-09-09'
Description: Secrets Manager secrets for Gmail (Google) + Outlook (Microsoft) OAuth client credentials.

Parameters:
  ProjectName:
    Type: String
    Default: octoflash
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  # Google OAuth (Gmail)
  GoogleClientId:
    Type: String
    Description: Google OAuth 2.0 Web Application Client ID
    NoEcho: true
    Default: REPLACE_AT_DEPLOY_TIME
  GoogleClientSecret:
    Type: String
    Description: Google OAuth 2.0 Client Secret
    NoEcho: true
    Default: REPLACE_AT_DEPLOY_TIME
  GoogleRedirectUri:
    Type: String
    Description: Where Google redirects after consent (must match Google Console)
    Default: https://octoflash.ai/oauth/callback/google

  # Microsoft OAuth (Outlook)
  MsClientId:
    Type: String
    Description: Azure AD Application (client) ID
    NoEcho: true
    Default: REPLACE_AT_DEPLOY_TIME
  MsClientSecret:
    Type: String
    Description: Azure AD Client secret value
    NoEcho: true
    Default: REPLACE_AT_DEPLOY_TIME
  MsTenantId:
    Type: String
    Description: Azure AD Directory (tenant) ID. Use 'common' for multi-tenant.
    Default: common
  MsRedirectUri:
    Type: String
    Description: Where Microsoft redirects after consent (must match App registration)
    Default: https://octoflash.ai/oauth/callback/microsoft

Resources:

  GoogleOauthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-google-oauth'
      Description: Google OAuth Web App credentials for Gmail mailbox connect
      SecretString: !Sub |
        {
          "client_id": "${GoogleClientId}",
          "client_secret": "${GoogleClientSecret}",
          "redirect_uri": "${GoogleRedirectUri}"
        }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-google-oauth-secret

  MicrosoftOauthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-microsoft-oauth'
      Description: Microsoft Azure AD App credentials for Outlook mailbox connect
      SecretString: !Sub |
        {
          "client_id": "${MsClientId}",
          "client_secret": "${MsClientSecret}",
          "tenant_id": "${MsTenantId}",
          "redirect_uri": "${MsRedirectUri}"
        }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-microsoft-oauth-secret

Outputs:
  GoogleOauthSecretArn:
    Description: ARN of the Google OAuth secret
    Value: !Ref GoogleOauthSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-google-oauth-secret-arn'

  MicrosoftOauthSecretArn:
    Description: ARN of the Microsoft OAuth secret
    Value: !Ref MicrosoftOauthSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-microsoft-oauth-secret-arn'
