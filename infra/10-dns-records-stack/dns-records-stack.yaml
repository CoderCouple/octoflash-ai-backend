AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DNS foundation — owns the wildcard ACM certificate (*.octoflash.ai) so it
  survives teardown/redeploy of the ECS stacks. Deploy this once, before
  stacks 05 (Python ECS) and 08 (NextJS ECS). The public hosted zone itself
  is still managed manually (see PREFLIGHT.md); CFN only owns the cert here.

Parameters:
  ProjectName:
    Type: String
    Default: octoflash
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  DomainName:
    Type: String
    Default: octoflash.ai
    Description: Public domain (no trailing dot)
  PublicHostedZoneId:
    Description: Route 53 hosted zone ID for DomainName
    Type: AWS::Route53::HostedZone::Id
    Default: Z00628722L7RGH80G6C89

Resources:
  # Wildcard ACM certificate covering *.octoflash.ai + octoflash.ai.
  # CloudFormation creates the DNS validation CNAME automatically because we
  # pass HostedZoneId in DomainValidationOptions — validation completes in
  # ~60 s once Namecheap NS is delegated to Route 53.
  WildcardCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub '*.${DomainName}'
      SubjectAlternativeNames:
        - !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub '*.${DomainName}'
          HostedZoneId: !Ref PublicHostedZoneId
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-wildcard-cert

Outputs:
  WildcardCertificateArn:
    Description: ARN of the wildcard ACM certificate (imported by stacks 05 + 08)
    Value: !Ref WildcardCertificate
    Export:
      Name: !Sub '${AWS::StackName}-WildcardCertificateArn'
